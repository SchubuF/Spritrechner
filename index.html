<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verbrauchsrechner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Barlow+Condensed:wght@300;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #010c06;
      --card:      #021408;
      --card2:     #031a0a;
      --border:    #0a3018;
      --border2:   #0e3d20;
      --green:     #004225;
      --green-mid: #006b38;
      --green-hi:  #00a85a;
      --amber:     #e8a020;
      --amber-dim: #a06a0a;
      --text:      #d4eddc;
      --text-dim:  #4a7a5c;
      --text-mute: #1e4a2c;
      --red:       #e04040;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
      font-family: 'Barlow Condensed', sans-serif;
    }
    .wrapper { width: 100%; max-width: 430px; }

    /* ── Profile Bar ── */
    .profile-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
    }
    .profile-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green-hi);
      box-shadow: 0 0 8px var(--green-hi);
      flex-shrink: 0;
    }
    .profile-name {
      flex: 1;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-label {
      color: var(--text-mute);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-right: 2px;
    }
    .btn-profile {
      background: var(--green);
      border: 1px solid var(--green-mid);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-profile:hover { background: var(--green-mid); }

    /* ── Sync Indicator ── */
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-mute);
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .sync-dot.syncing {
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
      animation: pulse 0.8s ease-in-out infinite;
    }
    .sync-dot.ok {
      background: var(--green-hi);
      box-shadow: 0 0 6px var(--green-hi);
    }
    .sync-dot.error {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .sync-label {
      color: var(--text-mute);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 28px; }
    .header .sub { color: var(--text-mute); font-size: 10px; letter-spacing: 0.35em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
    .header h1 { color: var(--text); font-size: 44px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
    .header h1 span { color: var(--green-hi); }
    .header .year-range { color: var(--text-mute); font-size: 10px; letter-spacing: 0.2em; font-family: 'DM Mono', monospace; margin-top: 6px; min-height: 16px; }

    /* ── Card ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); margin-bottom: 14px; }

    /* ── Inputs ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; color: var(--text-dim); font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 7px; }
    .input-row { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--green-mid); }
    .input-row input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 24px; font-family: 'DM Mono', monospace; font-weight: 700; padding: 11px 14px; width: 0; }
    .input-row input::placeholder { color: var(--text-mute); }
    .input-row input[type="date"] { font-size: 15px; }
    .input-row .unit { color: var(--text-mute); font-size: 14px; font-family: 'DM Mono', monospace; padding-right: 14px; white-space: nowrap; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

    /* ── Results ── */
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0 14px; }
    .result-box { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; transition: border-color 0.3s, box-shadow 0.3s; }
    .result-box.main { grid-column: 1 / -1; padding: 18px 20px; }
    .result-box .rval { font-size: 52px; font-family: 'DM Mono', monospace; font-weight: 700; line-height: 1; color: var(--text-mute); }
    .result-box.small .rval { font-size: 26px; }
    .result-box .rlabel { color: var(--text-dim); font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 5px; }
    .badge { display: inline-block; margin-top: 8px; border-radius: 20px; padding: 3px 14px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; border: 1px solid transparent; }
    .placeholder-text { color: var(--text-mute); font-size: 14px; font-family: 'DM Mono', monospace; padding: 6px 0; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-save { flex: 1; padding: 12px; background: var(--green); border: 1px solid var(--green-mid); border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 700; letter-spacing: 0.15em; font-family: 'DM Mono', monospace; cursor: pointer; transition: background 0.2s, box-shadow 0.2s; text-transform: uppercase; }
    .btn-save:hover:not(:disabled) { background: var(--green-mid); box-shadow: 0 0 20px rgba(0,66,37,0.5); }
    .btn-save:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-icon { padding: 12px 13px; background: transparent; border: 1px solid var(--border2); border-radius: 10px; color: var(--text-dim); font-size: 15px; cursor: pointer; transition: border-color 0.2s, color 0.2s; line-height: 1; }
    .btn-icon:hover { border-color: var(--amber-dim); color: var(--amber); }
    .btn-icon.import-btn:hover { border-color: var(--green-mid); color: var(--green-hi); }
    .btn-icon[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #031a0a;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
    }
    .btn-wrap { position: relative; }

    /* ── Stats ── */
    .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; }
    .stat .stat-val { font-size: 17px; font-family: 'DM Mono', monospace; font-weight: 700; line-height: 1; }
    .stat .stat-lbl { color: var(--text-dim); font-size: 8px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }

    /* ── History ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-title { color: var(--text-mute); font-size: 10px; letter-spacing: 0.25em; font-family: 'DM Mono', monospace; text-transform: uppercase; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
    .entry:hover { border-color: var(--border2); }
    .entry-left { flex: 1; min-width: 0; }
    .entry-date { color: var(--text-dim); font-size: 12px; font-family: 'DM Mono', monospace; }
    .entry-details { color: var(--text-mute); font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 3px; }
    .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .entry-val { font-size: 19px; font-family: 'DM Mono', monospace; font-weight: 700; }
    .entry-unit { color: var(--text-mute); font-size: 9px; font-family: 'DM Mono', monospace; }
    .entry-cost { color: var(--amber); font-size: 13px; font-family: 'DM Mono', monospace; }
    .trend { font-size: 14px; margin-left: 2px; }
    .btn-del { background: none; border: none; color: var(--text-mute); font-size: 13px; cursor: pointer; padding: 0 0 0 6px; transition: color 0.2s; flex-shrink: 0; }
    .btn-del:hover { color: #ef4444; }

    /* ── Divider ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent); margin: 4px 0 14px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }
    .modal-title {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }
    .modal-title span { color: var(--green-hi); }
    .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; max-height: 240px; overflow-y: auto; }
    .profile-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .profile-item:hover { border-color: var(--green-mid); }
    .profile-item.active { border-color: var(--green-hi); background: #021408; }
    .profile-item-name {
      flex: 1;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }
    .profile-item-count {
      color: var(--text-mute);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
    }
    .profile-item.active .profile-item-name { color: var(--green-hi); }
    .profile-active-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green-hi);
      box-shadow: 0 0 6px var(--green-hi);
      flex-shrink: 0;
      opacity: 0;
    }
    .profile-item.active .profile-active-dot { opacity: 1; }
    .btn-del-profile {
      background: none;
      border: none;
      color: var(--text-mute);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .btn-del-profile:hover { color: var(--red); }

    .new-profile-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .new-profile-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .new-profile-row input:focus { border-color: var(--green-mid); }
    .new-profile-row input::placeholder { color: var(--text-mute); }
    .btn-add-profile {
      background: var(--green);
      border: 1px solid var(--green-mid);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-add-profile:hover { background: var(--green-mid); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
    }
    .btn-close-modal {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-close-modal:hover { border-color: var(--text-dim); color: var(--text); }

    .modal-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      margin: 14px 0;
    }
    .modal-section-label {
      color: var(--text-mute);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* hidden file input */
    #fileImport { display: none; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Profile Bar -->
  <div class="profile-bar">
    <div class="profile-dot"></div>
    <div>
      <div class="profile-label">Profil</div>
      <div class="profile-name" id="profileNameDisplay">–</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">
      <div class="sync-dot" id="syncDot" title="Cloud-Sync Status"></div>
      <div class="sync-label" id="syncLabel">–</div>
    </div>
    <button class="btn-profile" onclick="openModal()">&#9778; Verwalten</button>
  </div>

  <div class="header">
    <div class="sub">&#9672; NACH DEM TANKEN</div>
    <h1>VERBRAUCH<span>.</span></h1>
    <div class="year-range" id="yearRange"></div>
  </div>

  <div class="card">
    <!-- Liter + Preis -->
    <div class="input-grid">
      <div class="field" style="margin-bottom:0">
        <label>Getankte Liter</label>
        <div class="input-row">
          <input type="number" id="liter" placeholder="42" min="0" step="0.01" oninput="berechnen()" />
          <span class="unit">L</span>
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Preis pro Liter</label>
        <div class="input-row">
          <input type="number" id="preis" placeholder="1.85" min="0" step="0.001" oninput="berechnen()" />
          <span class="unit">&#8364;/L</span>
        </div>
      </div>
    </div>

    <div style="height:14px"></div>

    <!-- KM -->
    <div class="field">
      <label>Gefahrene Kilometer</label>
      <div class="input-row">
        <input type="number" id="km" placeholder="z. B. 480" min="0" step="1" oninput="berechnen()" />
        <span class="unit">km</span>
      </div>
    </div>

    <!-- Datum -->
    <div class="field" style="margin-bottom:0">
      <label>Datum</label>
      <div class="input-row">
        <input type="date" id="datum" />
        <span class="unit" style="font-size:12px">&#128197;</span>
      </div>
    </div>

    <!-- Results -->
    <div class="result-grid" id="resultGrid">
      <div class="result-box main"><div class="placeholder-text">Werte eingeben &#8594;</div></div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-save" id="btnSave" onclick="speichern()" disabled>&#xFF0B; Speichern</button>
      <div class="btn-wrap">
        <button class="btn-icon import-btn" onclick="document.getElementById('fileImport').click()" title="JSON importieren">&#8679;</button>
      </div>
      <div class="btn-wrap">
        <button class="btn-icon" onclick="exportJSON()" title="JSON exportieren">&#8681;</button>
      </div>
      <div class="btn-wrap">
        <button class="btn-icon" onclick="exportCSV()" title="CSV exportieren">&#8595; CSV</button>
      </div>
    </div>
    <input type="file" id="fileImport" accept=".json" onchange="importJSON(event)" />
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-val" id="statAvg">&#8212;</div>
      <div class="stat-lbl">&#8960; L/100km</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statBest">&#8212;</div>
      <div class="stat-lbl">Bestwert</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statTotal">&#8212;</div>
      <div class="stat-lbl">Gesamt &#8364;</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statCount">&#8212;</div>
      <div class="stat-lbl">Tankstopps</div>
    </div>
  </div>

  <!-- History -->
  <div id="historySection" style="display:none">
    <div class="section-header">
      <div class="section-title">Verlauf</div>
    </div>
    <div class="divider"></div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">PROFIL<span>.</span></div>

    <div class="modal-section-label">Profil wechseln</div>
    <div class="profile-list" id="profileList"></div>

    <div class="modal-divider"></div>
    <div class="modal-section-label">Neues Profil anlegen</div>
    <div class="new-profile-row">
      <input type="text" id="newProfileName" placeholder="z. B. Golf GTI" maxlength="30" onkeydown="if(event.key==='Enter') addProfile()" />
      <button class="btn-add-profile" onclick="addProfile()">&#xFF0B; Neu</button>
    </div>

    <div class="modal-footer">
      <button class="btn-close-modal" onclick="closeModal()">Schlie&#223;en</button>
    </div>
  </div>
</div>

<script>
  // ── Storage Keys ──────────────────────────────────────────────────
  var PROFILES_KEY = 'verbrauch_profiles_v1';      // list of {id, name}
  var ACTIVE_KEY   = 'verbrauch_active_profile';    // active profile id

  var current = null;

  var ratings = [
    { max: 7,   label: 'Sehr sparsam', color: '#00c85a' },
    { max: 9,   label: 'Gut \u2713',   color: '#5dba7a' },
    { max: 11,  label: 'Normal',        color: '#e8a020' },
    { max: 14,  label: 'Hoch',          color: '#e06020' },
    { max: 999, label: 'Sehr hoch',     color: '#e04040' },
  ];

  function getRating(v) { return ratings.find(function(r){ return v < r.max; }); }

  // ── Profile helpers ───────────────────────────────────────────────
  function getProfiles() {
    try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || []; } catch(e) { return []; }
  }
  function saveProfiles(list) { localStorage.setItem(PROFILES_KEY, JSON.stringify(list)); }

  function getActiveId() { return localStorage.getItem(ACTIVE_KEY) || null; }
  function setActiveId(id) { localStorage.setItem(ACTIVE_KEY, id); }

  function entriesKey(id) { return 'verbrauch_entries_' + id; }
  function getEntries(id) { try { return JSON.parse(localStorage.getItem(entriesKey(id))) || []; } catch(e) { return []; } }
  function saveEntries(id, list) { localStorage.setItem(entriesKey(id), JSON.stringify(list)); }

  function activeEntries() { return getEntries(getActiveId()); }
  function saveActiveEntries(list) { saveEntries(getActiveId(), list); }

  // ── Init ─────────────────────────────────────────────────────────
  (function init() {
    var profiles = getProfiles();

    // First run → create default profile
    if (profiles.length === 0) {
      var id = 'p_' + Date.now();
      profiles = [{ id: id, name: 'Mein Auto' }];
      saveProfiles(profiles);
    }

    // Ensure active profile is valid
    var activeId = getActiveId();
    if (!activeId || !profiles.find(function(p){ return p.id === activeId; })) {
      setActiveId(profiles[0].id);
    }

    // Default date
    var d = document.getElementById('datum');
    var now = new Date();
    d.value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

    updateProfileBar();
    renderHistory();
  })();

  function updateProfileBar() {
    var profiles = getProfiles();
    var active = profiles.find(function(p){ return p.id === getActiveId(); });
    document.getElementById('profileNameDisplay').textContent = active ? active.name : '–';
  }

  // ── Modal ─────────────────────────────────────────────────────────
  function openModal() {
    renderProfileList();
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('newProfileName').focus();
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('newProfileName').value = '';
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function renderProfileList() {
    var profiles = getProfiles();
    var activeId = getActiveId();
    var list = document.getElementById('profileList');

    if (profiles.length === 0) {
      list.innerHTML = '<div style="color:var(--text-mute);font-family:DM Mono,monospace;font-size:11px;padding:8px 0;">Keine Profile vorhanden.</div>';
      return;
    }

    list.innerHTML = profiles.map(function(p) {
      var count = getEntries(p.id).length;
      var isActive = p.id === activeId;
      return '<div class="profile-item' + (isActive ? ' active' : '') + '" onclick="switchProfile(\'' + p.id + '\')">' +
        '<div class="profile-active-dot"></div>' +
        '<div class="profile-item-name">' + escHtml(p.name) + '</div>' +
        '<div class="profile-item-count">' + count + ' Eintr.' + '</div>' +
        (profiles.length > 1 ? '<button class="btn-del-profile" onclick="deleteProfile(event,\'' + p.id + '\')">\u2715</button>' : '') +
      '</div>';
    }).join('');
  }

  function switchProfile(id) {
    setActiveId(id);
    updateProfileBar();
    renderProfileList();
    renderHistory();
    closeModal();
  }

  function addProfile() {
    var input = document.getElementById('newProfileName');
    var name = input.value.trim();
    if (!name) { input.focus(); return; }

    var profiles = getProfiles();
    var id = 'p_' + Date.now();
    profiles.push({ id: id, name: name });
    saveProfiles(profiles);
    input.value = '';
    switchProfile(id);
  }

  function deleteProfile(e, id) {
    e.stopPropagation();
    var profiles = getProfiles();
    var profile = profiles.find(function(p){ return p.id === id; });
    if (!profile) return;
    var count = getEntries(id).length;
    var msg = 'Profil "' + profile.name + '" l\u00f6schen?' + (count > 0 ? '\n(' + count + ' Eintr\u00e4ge gehen verloren)' : '');
    if (!confirm(msg)) return;

    // Remove entries
    localStorage.removeItem(entriesKey(id));

    var newList = profiles.filter(function(p){ return p.id !== id; });
    saveProfiles(newList);

    // If deleted active, switch to first
    if (getActiveId() === id) {
      setActiveId(newList[0].id);
      updateProfileBar();
      renderHistory();
    }
    renderProfileList();
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDatum(isoStr) {
    if (!isoStr) return '';
    var p = isoStr.split('-');
    return p[2] + '.' + p[1] + '.' + p[0];
  }

  // ── Calculation ───────────────────────────────────────────────────
  function berechnen() {
    var l = parseFloat(document.getElementById('liter').value);
    var k = parseFloat(document.getElementById('km').value);
    var p = parseFloat(document.getElementById('preis').value);
    var btn = document.getElementById('btnSave');
    var grid = document.getElementById('resultGrid');

    if (!l || !k || k <= 0) {
      grid.innerHTML = '<div class="result-box main"><div class="placeholder-text">Werte eingeben \u2192</div></div>';
      btn.disabled = true;
      current = null;
      return;
    }

    var v = (l / k) * 100;
    var kosten = (p > 0) ? l * p : null;
    var euroPro100 = (p > 0) ? p * v : null;
    var r = getRating(v);
    current = {
      liter: l, km: k,
      preis: (p > 0 ? p : null),
      verbrauch: parseFloat(v.toFixed(2)),
      kosten: kosten ? parseFloat(kosten.toFixed(2)) : null
    };

    var html = '<div class="result-box main" style="border-color:' + r.color + '44; box-shadow:0 0 24px ' + r.color + '14">' +
      '<div class="rval" style="color:' + r.color + '; filter:drop-shadow(0 0 8px ' + r.color + '66)">' + v.toFixed(1) + '</div>' +
      '<div class="rlabel">Liter pro 100 km</div>' +
      '<div class="badge" style="background:' + r.color + '18; border-color:' + r.color + '44; color:' + r.color + '">' + r.label + '</div>' +
    '</div>';

    if (kosten !== null) {
      html +=
        '<div class="result-box small" style="border-color:#a0601844">' +
          '<div class="rval" style="color:#e8a020">' + kosten.toFixed(2) + ' <span style="font-size:13px;color:#4a7a5c">\u20ac</span></div>' +
          '<div class="rlabel">bezahlt</div>' +
        '</div>' +
        '<div class="result-box small" style="border-color:#0a301844">' +
          '<div class="rval" style="color:#5dba7a">' + euroPro100.toFixed(2) + ' <span style="font-size:13px;color:#4a7a5c">\u20ac</span></div>' +
          '<div class="rlabel">\u20ac / 100 km</div>' +
        '</div>';
    }

    grid.innerHTML = html;
    btn.disabled = false;
  }

  // ── Save / Delete ─────────────────────────────────────────────────
  function speichern() {
    if (!current) return;
    var datumVal = document.getElementById('datum').value;
    var eintraege = activeEntries();
    var eintrag = {
      id: Date.now(),
      datum: datumVal,
      datumAnzeige: formatDatum(datumVal),
      liter: current.liter,
      km: current.km,
      preis: current.preis,
      verbrauch: current.verbrauch,
      kosten: current.kosten
    };
    eintraege.unshift(eintrag);
    eintraege.sort(function(a,b){ return (b.datum||'').localeCompare(a.datum||''); });
    saveActiveEntries(eintraege);

    document.getElementById('liter').value = '';
    document.getElementById('km').value = '';
    document.getElementById('preis').value = '';
    document.getElementById('resultGrid').innerHTML = '<div class="result-box main"><div class="placeholder-text" style="color:#5dba7a">\u2713 Gespeichert</div></div>';
    document.getElementById('btnSave').disabled = true;
    current = null;
    renderHistory();
  }

  function loeschen(id) {
    if (!confirm('Eintrag l\u00f6schen?')) return;
    saveActiveEntries(activeEntries().filter(function(e){ return e.id !== id; }));
    renderHistory();
  }

  // ── Export ────────────────────────────────────────────────────────
  function exportJSON() {
    var profiles = getProfiles();
    var activeId = getActiveId();
    var profile = profiles.find(function(p){ return p.id === activeId; });
    var eintraege = activeEntries();
    if (eintraege.length === 0) { alert('Keine Eintr\u00e4ge zum Exportieren.'); return; }

    var payload = {
      exportVersion: 1,
      profileName: profile ? profile.name : 'Export',
      exportedAt: new Date().toISOString(),
      entries: eintraege
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var safeName = (profile ? profile.name : 'profil').replace(/[^a-z0-9äöü]/gi, '_').toLowerCase();
    a.href = url; a.download = 'verbrauch_' + safeName + '.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function exportCSV() {
    var eintraege = activeEntries();
    if (eintraege.length === 0) { alert('Keine Eintr\u00e4ge zum Exportieren.'); return; }
    var rows = ['Datum,Liter,Kilometer,Preis_EUR_pro_L,Verbrauch_L100km,Kosten_EUR'];
    eintraege.forEach(function(e){
      rows.push([
        e.datumAnzeige || formatDatum(e.datum) || '',
        e.liter, e.km,
        e.preis !== null ? e.preis : '',
        e.verbrauch,
        e.kosten !== null ? e.kosten : ''
      ].join(','));
    });
    var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'verbrauch.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  // ── Import ────────────────────────────────────────────────────────
  function importJSON(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);

        // Validate
        if (!data.entries || !Array.isArray(data.entries) || data.entries.length === 0) {
          alert('Ungültige Datei: Keine Einträge gefunden.');
          return;
        }

        var profileName = data.profileName || file.name.replace('.json','');
        var action = confirm(
          'Datei: "' + profileName + '"\n' +
          data.entries.length + ' Eintr\u00e4ge gefunden.\n\n' +
          'OK = In aktives Profil importieren (wird \u00fcberschrieben)\n' +
          'Abbrechen = Als neues Profil anlegen'
        );

        if (action) {
          // Overwrite active profile
          saveActiveEntries(data.entries);
          renderHistory();
          alert('\u2713 ' + data.entries.length + ' Eintr\u00e4ge importiert.');
        } else {
          // Create new profile with this data
          var newId = 'p_' + Date.now();
          var profiles = getProfiles();
          profiles.push({ id: newId, name: profileName });
          saveProfiles(profiles);
          saveEntries(newId, data.entries);
          switchProfile(newId);
          alert('\u2713 Neues Profil "' + profileName + '" mit ' + data.entries.length + ' Eintr\u00e4gen angelegt.');
        }
      } catch(err) {
        alert('Fehler beim Lesen der Datei. Ist es eine g\u00fcltige JSON-Datei?');
      }
      // Reset file input so same file can be re-imported
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── Render History ────────────────────────────────────────────────
  function renderHistory() {
    var eintraege = activeEntries();
    var statsBar = document.getElementById('statsBar');
    var historySection = document.getElementById('historySection');
    var list = document.getElementById('historyList');

    if (eintraege.length === 0) {
      statsBar.style.display = 'none';
      historySection.style.display = 'none';
      document.getElementById('yearRange').textContent = '';
      return;
    }

    statsBar.style.display = 'grid';
    historySection.style.display = 'block';

    var values = eintraege.map(function(e){ return e.verbrauch; });
    var avg = values.reduce(function(a,b){ return a+b; }, 0) / values.length;
    var best = Math.min.apply(null, values);
    var totalKosten = eintraege.filter(function(e){ return e.kosten; }).reduce(function(s,e){ return s+e.kosten; }, 0);
    var rAvg = getRating(avg);

    document.getElementById('statAvg').textContent = avg.toFixed(1);
    document.getElementById('statAvg').style.color = rAvg.color;
    document.getElementById('statBest').textContent = best.toFixed(1);
    document.getElementById('statBest').style.color = '#00c85a';
    document.getElementById('statTotal').textContent = totalKosten > 0 ? totalKosten.toFixed(2)+'\u20ac' : '\u2014';
    document.getElementById('statTotal').style.color = '#e8a020';
    document.getElementById('statCount').textContent = eintraege.length;
    document.getElementById('statCount').style.color = '#d4eddc';

    var dates = eintraege.map(function(e){ return e.datum || ''; }).filter(Boolean).sort();
    if (dates.length > 0) {
      var from = formatDatum(dates[0]);
      var to = formatDatum(dates[dates.length-1]);
      document.getElementById('yearRange').textContent = from === to ? from : from + ' \u2013 ' + to;
    }

    list.innerHTML = eintraege.map(function(e, i) {
      var r = getRating(e.verbrauch);
      var parts = [e.liter + ' L', e.km + ' km'];
      if (e.preis) parts.push(e.preis.toFixed(3) + ' \u20ac/L');

      var trend = '';
      if (i < eintraege.length - 1) {
        var prev = eintraege[i+1].verbrauch;
        if (e.verbrauch < prev - 0.2) trend = '<span class="trend" style="color:#00c85a" title="Besser als vorher">\u25bc</span>';
        else if (e.verbrauch > prev + 0.2) trend = '<span class="trend" style="color:#e04040" title="Schlechter als vorher">\u25b2</span>';
        else trend = '<span class="trend" style="color:#4a7a5c" title="Gleich wie vorher">\u25ac</span>';
      }

      return '<div class="entry">' +
        '<div class="entry-left">' +
          '<div class="entry-date">' + (e.datumAnzeige || formatDatum(e.datum) || '\u2014') + '</div>' +
          '<div class="entry-details">' + parts.join(' \u00b7 ') + '</div>' +
        '</div>' +
        '<div class="entry-right">' +
          '<div class="entry-val" style="color:' + r.color + '">' + e.verbrauch.toFixed(1) + trend + ' <span class="entry-unit">L/100</span></div>' +
          (e.kosten ? '<div class="entry-cost">' + e.kosten.toFixed(2) + ' \u20ac</div>' : '') +
        '</div>' +
        '<button class="btn-del" onclick="loeschen(' + e.id + ')" title="L\u00f6schen">\u2715</button>' +
      '</div>';
    }).join('');
  }
</script>
<!-- ═══════════════════════════════════════════════════════════
     FIREBASE / FIRESTORE INTEGRATION
     ─────────────────────────────────────────────────────────
     1) Ersetze die Werte in firebaseConfig mit deinen echten
        Werten aus der Firebase Console.
     2) Speichere diese index.html in dein GitHub-Repo.
     3) Security Rules in Firestore Console:
        allow read, write: if true;
     ═══════════════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // ── 🔧 HIER DEINE FIREBASE-DATEN EINTRAGEN ──────────────────────────
  var firebaseConfig = {
    apiKey:            "AIzaSyAWjXLanhcXddFTrUY1Gu9loyOEFsFGIJw",
    authDomain:        "spritrechner-github.firebaseapp.com",
    projectId:         "spritrechner-github",
    storageBucket:     "spritrechner-github.firebasestorage.app",
    messagingSenderId: "910273357882",
    appId:             "1:910273357882:web:73dd100dba7c20ec446d03"
  };
  // ────────────────────────────────────────────────────────────────────

  var db = null;

  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e) {
    console.warn('Firebase init fehlgeschlagen:', e.message);
  }

  // ── Sync-Status-Anzeige ──────────────────────────────────────────────
  function setSyncStatus(status) {
    var dot   = document.getElementById('syncDot');
    var label = document.getElementById('syncLabel');
    if (!dot) return;
    dot.className = 'sync-dot ' + status;
    var labels = { syncing: 'sync...', ok: 'cloud', error: 'offline', '': '–' };
    label.textContent = labels[status] || '–';
  }

  // ── Alle Einträge eines Profils in Firestore schreiben ───────────────
  function pushToFirestore(profileId, entries) {
    if (!db || firebaseConfig.projectId === 'dein-projekt-id') return;
    setSyncStatus('syncing');
    db.collection('profiles').doc(profileId)
      .set({ entries: entries, updatedAt: new Date().toISOString() }, { merge: true })
      .then(function() { setSyncStatus('ok'); })
      .catch(function(err) {
        console.error('Firestore write error:', err);
        setSyncStatus('error');
      });
  }

  // ── Einträge eines Profils aus Firestore laden ───────────────────────
  function pullFromFirestore(profileId, callback) {
    if (!db || firebaseConfig.projectId === 'dein-projekt-id') {
      setSyncStatus('error');
      if (callback) callback(false);
      return;
    }
    setSyncStatus('syncing');
    db.collection('profiles').doc(profileId).get()
      .then(function(doc) {
        if (doc.exists && Array.isArray(doc.data().entries)) {
          // Firestore-Daten gewinnen — localStorage überschreiben
          saveEntries(profileId, doc.data().entries);
        }
        setSyncStatus('ok');
        if (callback) callback(true);
      })
      .catch(function(err) {
        console.error('Firestore read error:', err);
        setSyncStatus('error');
        if (callback) callback(false);
      });
  }

  // ── saveActiveEntries überschreiben: lokal + Cloud ───────────────────
  var _origSaveActiveEntries = saveActiveEntries;
  saveActiveEntries = function(list) {
    var id = getActiveId();
    saveEntries(id, list);          // localStorage (sofort, für UI-Reaktion)
    pushToFirestore(id, list);      // Firestore (async im Hintergrund)
  };

  // ── switchProfile überschreiben: erst Cloud laden, dann rendern ──────
  var _origSwitchProfile = switchProfile;
  switchProfile = function(id) {
    setActiveId(id);
    updateProfileBar();
    closeModal();
    pullFromFirestore(id, function() {
      renderProfileList();
      renderHistory();
    });
  };

  // ── Beim Start: aktives Profil aus Cloud laden ───────────────────────
  (function syncOnLoad() {
    var activeId = getActiveId();
    if (!activeId) return;

    // Lokale Daten schon vorhanden? Sofort rendern, dann Cloud prüfen
    if (activeEntries().length > 0) {
      renderHistory(); // bereits durch init() passiert
    }

    pullFromFirestore(activeId, function(success) {
      if (success) renderHistory(); // neu rendern mit Cloud-Daten
    });

    // Lokale Daten einmalig hochladen falls Firestore leer
    var localEntries = getEntries(activeId);
    if (localEntries.length > 0) {
      pushToFirestore(activeId, localEntries);
    }
  })();
</script>
